name: CI

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev gcc libpq-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run checks
        run: cargo check --verbose

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests & coverage
        run: cargo tarpaulin --verbose --workspace --timeout 120 --out xml

      - name: Build docs
        run: cargo doc --no-deps

      - name: Build debian Docker image
        run: docker build -t cdd-ctl:debian -f debian.Dockerfile .

      - name: Build alpine Docker image
        run: docker build -t cdd-ctl:alpine -f alpine.Dockerfile .

  release:
    name: Build & Release Binaries
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cdd-ctl
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: cdd-ctl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cdd-ctl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cdd-ctl.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          name: Release ${{ github.ref_name }}

  update_latest_tag:
    name: Update Latest Tag
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Update latest tag (Local only, push disabled per policy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest ${{ github.sha }}
